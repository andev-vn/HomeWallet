<style>

<script>
        // Simple script to format number input with dots for thousands
        const amountInput = document.getElementById('amountInput');
        
        amountInput.addEventListener('input', function(e) {
            // Remove non-digit characters
            let value = this.value.replace(/\D/g, '');
            
            // Format with dots
            if (value !== '') {
                value = parseInt(value, 10).toLocaleString('vi-VN').replace(/,/g, '.');
            }
            
            this.value = value;
            
            // Dynamic width adjustment to keep it centered properly
            const tempSpan = document.createElement('span');
            tempSpan.style.visibility = 'hidden';
            tempSpan.style.position = 'absolute';
            tempSpan.style.fontFamily = window.getComputedStyle(this).fontFamily;
            tempSpan.style.fontSize = window.getComputedStyle(this).fontSize;
            tempSpan.style.fontWeight = window.getComputedStyle(this).fontWeight;
            tempSpan.style.letterSpacing = window.getComputedStyle(this).letterSpacing;
            tempSpan.textContent = this.value || this.placeholder;
            document.body.appendChild(tempSpan);
            
            // Set width with a small buffer, min width 20px, max 100%
            const newWidth = Math.max(20, tempSpan.getBoundingClientRect().width);
            this.style.width = newWidth + 'px';
            
            document.body.removeChild(tempSpan);
        });

        // Trigger input event to set initial width
        amountInput.dispatchEvent(new Event('input'));
    </script>
