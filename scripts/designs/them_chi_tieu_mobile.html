<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Entrance animation for the sheet */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

<body class="bg-surface-variant font-body-md text-on-surface h-screen w-screen overflow-hidden relative">
<!-- Mock Background App Content (to show overlay context) -->
<div class="p-container-margin w-full max-w-md mx-auto">
<div class="h-32 bg-surface rounded-xl shadow-sm mb-4"></div>
<div class="h-64 bg-surface rounded-xl shadow-sm mb-4"></div>
<div class="h-20 bg-surface rounded-xl shadow-sm"></div>
</div>
<!-- Bottom Sheet Overlay Backdrop -->
<div class="fixed inset-0 bg-inverse-surface/40 backdrop-blur-[2px] z-40 transition-opacity duration-300"></div>
<!-- Bottom Sheet Container -->
<div class="fixed bottom-0 left-0 right-0 z-50 w-full max-w-md mx-auto bg-surface rounded-t-[24px] shadow-[0_-8px_32px_rgba(249,115,22,0.12)] flex flex-col max-h-[795px] animate-slide-up pb-safe">
<!-- Drag Handle & Header -->
<div class="pt-sm pb-xs px-gutter flex flex-col items-center relative rounded-t-[24px] bg-surface">
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full mb-md"></div>
<div class="w-full flex justify-between items-center">
<div class="w-10"></div> <!-- Spacer for centering title -->
<h2 class="font-title-md text-title-md text-on-surface">Thêm Chi Tiêu</h2>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant active:scale-95 transition-transform">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto no-scrollbar px-gutter pb-xl pt-sm">
<!-- Large Amount Input -->
<div class="flex flex-col items-center justify-center mb-xl">
<label class="font-label-md text-label-md text-on-surface-variant mb-base">Số tiền</label>
<div class="flex items-baseline gap-xs">
<span class="font-price-display text-price-display text-primary">₫</span>
<input class="font-display-lg text-display-lg text-primary bg-transparent border-none outline-none text-center w-full max-w-[200px] p-0 focus:ring-0 placeholder:text-outline-variant/40" placeholder="0" type="tel" value="250,000"/>
</div>
<div class="h-px w-32 bg-outline-variant mt-xs"></div>
</div>
<!-- Category Selection (3 Column Grid) -->
<div class="mb-lg">
<h3 class="font-label-md text-label-md text-on-surface-variant mb-md px-xs">Chọn danh mục</h3>
<div class="grid grid-cols-3 gap-y-lg gap-x-sm">
<!-- Category Item: Active -->
<button class="flex flex-col items-center gap-xs group active:scale-95 transition-transform">
<div class="w-16 h-16 rounded-2xl bg-primary-container/15 border-2 border-primary-container flex items-center justify-center text-primary shadow-sm">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<span class="font-label-md text-label-md text-primary">Ăn uống</span>
</button>
<!-- Category Item: Inactive -->
<button class="flex flex-col items-center gap-xs group active:scale-95 transition-transform">
<div class="w-16 h-16 rounded-2xl bg-surface-container-high border-2 border-transparent flex items-center justify-center text-on-surface-variant group-hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-[28px]">directions_car</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant text-[14px]">Di chuyển</span>
</button>
<!-- Category Item: Inactive -->
<button class="flex flex-col items-center gap-xs group active:scale-95 transition-transform">
<div class="w-16 h-16 rounded-2xl bg-surface-container-high border-2 border-transparent flex items-center justify-center text-on-surface-variant group-hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-[28px]">local_mall</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant text-[14px]">Mua sắm</span>
</button>

<div class="w-16 h-16 rounded-2xl bg-surface-container-high border-2 border-transparent flex items-center justify-center text-on-surface-variant group-hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-[28px]">receipt_long</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant text-[14px]">Hóa đơn</span>
</button>
<!-- Category Item: Inactive -->
<button class="flex flex-col items-center gap-xs group active:scale-95 transition-transform">
<div class="w-16 h-16 rounded-2xl bg-surface-container-high border-2 border-transparent flex items-center justify-center text-on-surface-variant group-hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-[28px]">favorite</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant text-[14px]">Sức khỏe</span>
</button>

<div class="w-16 h-16 rounded-2xl bg-surface-container-high border-2 border-transparent flex items-center justify-center text-on-surface-variant group-hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-[28px]">movie</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant text-[14px]">Giải trí</span>
</button>
</div>
</div>

<div class="relative bg-surface-container-lowest rounded-xl border border-outline-variant/50 focus-within:border-primary-container focus-within:shadow-[0_0_0_2px_rgba(249,115,22,0.1)] transition-all duration-200">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">edit_note</span>
</div>
<input class="w-full bg-transparent border-none py-sm pl-10 pr-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0 rounded-xl" placeholder="Thêm ghi chú (tùy chọn)" type="text"/>
</div>
</div>
</div>

<div class="px-gutter pb-lg pt-sm bg-surface border-t border-surface-container-highest">
<button class="w-full bg-gradient-to-r from-primary-container to-primary text-on-primary font-title-md text-title-md py-4 rounded-full shadow-[0_4px_12px_rgba(249,115,22,0.25)] active:scale-[0.98] transition-all flex items-center justify-center gap-xs">
<span class="material-symbols-outlined">check_circle</span>
                Lưu Chi Tiêu
            </button>
</div>
